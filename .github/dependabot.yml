# Automated dependency updates.
# Dependabot opens PRs for new versions; each PR runs the full CI (lint, typecheck,
# test, build) before it can be merged, so updates stay verifiable. Security fixes
# are delivered automatically when "Dependabot security updates" is enabled in the
# repository settings.
version: 2
updates:
  # npm dependencies (covers the root + all workspaces via the root lockfile)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Coupled ecosystems share peer ranges, so a lone bump leaves an incompatible /
      # duplicate-major tree (caught by check-no-dup-majors.sh). Batch each ecosystem —
      # ALL update types — into ONE atomic PR so it moves together or not at all.
      # (Grouping = atomicity; CI is the compatibility gate.) Groups are matched in
      # order, so these specific ones win before the minor-and-patch catch-all.
      vite: # affects the shipped bundle → reviewed manually
        patterns:
          - "vite"
          - "vitest"
          - "vite-plugin-*"
          - "@vitejs/*"
          - "@vitest/*"
          - "@tailwindcss/vite"
        update-types: ["major", "minor", "patch"]
      eslint: # lint-only, never ships → auto-merges on green (even majors)
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "globals"
        update-types: ["major", "minor", "patch"]
      types: # type defs only, erased at build → auto-merges on green
        patterns:
          - "@types/*"
        update-types: ["major", "minor", "patch"]
      # Batch other low-risk minor/patch bumps into a single PR to cut noise…
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # …while other major bumps (e.g. typescript, runtime deps) still get their own PR.

  # Keep the GitHub Actions used in CI up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      # Batch Action minor/patch bumps into one PR (auto-merged on green); majors
      # still get individual PRs for manual review.
      actions:
        update-types:
          - "minor"
          - "patch"
