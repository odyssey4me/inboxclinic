# Automated dependency updates.
# Dependabot opens PRs for new versions; each PR runs the full CI (lint, typecheck,
# test, build) before it can be merged, so updates stay verifiable. Security fixes
# are delivered automatically when "Dependabot security updates" is enabled in the
# repository settings.
version: 2
updates:
  # npm dependencies (covers the root + all workspaces via the root lockfile)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # The Vite/Vitest build ecosystem shares peer ranges, so a lone `vite` bump
      # leaves a duplicate major behind (caught by check-no-dup-majors.sh). Batch the
      # whole ecosystem — including majors — into ONE coordinated PR so it moves together.
      vite:
        patterns:
          - "vite"
          - "vitest"
          - "vite-plugin-*"
          - "@vitejs/*"
          - "@vitest/*"
          - "@tailwindcss/vite"
        update-types:
          - "major"
          - "minor"
          - "patch"
      # Batch other low-risk minor/patch bumps into a single PR to cut noise…
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # …while other major bumps still get their own PR for careful review.

  # Keep the GitHub Actions used in CI up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      # Batch Action minor/patch bumps into one PR (auto-merged on green); majors
      # still get individual PRs for manual review.
      actions:
        update-types:
          - "minor"
          - "patch"
