name: E2E

# Tier-3 end-to-end tests (docs/design-testing.md Decision 7): Playwright drives the
# built app through its no-Google demo mode across chromium, firefox, webkit, and a
# mobile viewport. No secrets, no Google — the demo store is ephemeral and in-memory.

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E (demo mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Installs the browser binaries + their system dependencies (needs the runner's
      # sudo). chromium also backs the mobile-viewport project. (No browser cache: the
      # cache action isn't SHA-pinned here; the download is a few seconds per run.)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # `npm run e2e` builds the app and serves the production bundle via vite preview
      # (playwright.config.ts webServer), then runs every project. CI is set by Actions,
      # so the config enables retries + the HTML report automatically.
      - name: Run E2E (demo mode)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
