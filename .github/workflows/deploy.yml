# Publishes the static PWA to GitHub Pages on push to main (design-deployment.md —
# Hosting target). No secrets: the OAuth client id and request-access URL are PUBLIC
# repo *variables*, and publishing uses OIDC (id-token), not a committed deploy key.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & publish to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static PWA)
        env:
          # Project-page sub-path; public build inputs from repo variables (never secrets).
          BASE_PATH: /inboxclinic/
          VITE_OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          VITE_REQUEST_ACCESS_URL: ${{ vars.REQUEST_ACCESS_URL }}
        run: npm run build

      - name: SPA fallback (serve index.html for unknown paths)
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
