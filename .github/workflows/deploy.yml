# Builds the static PWA in CI (deterministic — pinned Node via .nvmrc, npm ci, the same
# environment as ci.yml) and deploys it to Cloudflare Pages via wrangler (Direct Upload).
# See docs/design-deployment.md (Hosting target: Cloudflare Pages).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static PWA)
        env:
          # Public build inputs from repo variables (never secrets). Base defaults to "/".
          VITE_OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          VITE_REQUEST_ACCESS_URL: ${{ vars.REQUEST_ACCESS_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          # A MINIMAL token (Account → Cloudflare Pages → Edit only) — not the local
          # management token. Account id is public, kept as a repo variable.
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=inboxclinic --branch=main
