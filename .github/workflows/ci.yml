name: CI

# CI/CD pipeline. `build` (lint/typecheck/test/coverage/build), `e2e` (Tier-3 Playwright
# across chromium/firefox/webkit/mobile against demo mode), and `docs` (doc-sync
# validation) run on every push and PR. `ci-gate` depends on all three and is the SINGLE
# required status check — every PR, including docs-only ones, resolves to one gate that
# passes iff the real jobs did, so no PR gets stuck on a check that never reported.
# `deploy` runs only on main and needs build+e2e, so a broken build or a failing E2E run
# can never publish.

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Zero-secrets check
        run: ./scripts/check-no-secrets.sh

      - name: No duplicate major versions
        run: ./scripts/check-no-dup-majors.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test & coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E (demo mode)
    runs-on: ubuntu-24.04
    # Run inside the official Playwright image pinned to our @playwright/test version, so the
    # browsers (incl. WebKit's apt-only deps) match exactly and are the SAME image that
    # scripts/gate.sh uses locally (#107) — "green locally" == "green here". Renovate keeps
    # this tag in lockstep with the @playwright/test npm package. `setup-node` still installs
    # the repo-pinned Node (.nvmrc) over the image's newer bundled one (engine-strict).
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      # Firefox's sandbox creates a user namespace; GitHub's container runtime blocks the
      # clone() by default (EPERM) — chromium/webkit are unaffected. Allow it (#107). Rootless
      # podman already permits it, so scripts/gate.sh needs no equivalent.
      options: --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run e2e` builds the app and serves the production bundle via vite preview
      # (playwright.config.ts webServer), then runs every project. CI is set by Actions,
      # so the config enables retries + the HTML report automatically.
      - name: Run E2E (demo mode)
        # Firefox refuses to launch when $HOME isn't owned by the current user; point it at a
        # writable, root-owned dir in the container (GitHub sets HOME to a mounted path).
        env:
          HOME: /root
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  docs:
    name: Docs sync
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate documentation sync
        run: ./scripts/doc-sync-validate.sh

  ci-gate:
    name: CI gate
    runs-on: ubuntu-24.04
    needs: [build, e2e, docs]
    # Runs even when a gating job fails, so it always reports a result.
    if: always()
    steps:
      - name: Verify gating jobs passed
        env:
          BUILD: ${{ needs.build.result }}
          E2E: ${{ needs.e2e.result }}
          DOCS: ${{ needs.docs.result }}
        run: |
          # The SINGLE required status check. Passes only if every gating job succeeded
          # (or was legitimately skipped), so a PR resolves to one reliable gate instead of
          # several individual checks that may never report (docs-only PRs, etc.).
          echo "build=$BUILD  e2e=$E2E  docs=$DOCS"
          for r in "$BUILD" "$E2E" "$DOCS"; do
            case "$r" in
              success | skipped) ;;
              *) echo "::error::a gating job did not pass ($r)"; exit 1 ;;
            esac
          done
          echo "All gating jobs passed."

  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-24.04
    # Only publish from main, and only once both gates are green.
    needs: [build, e2e]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static PWA)
        env:
          # Public build inputs from repo variables (never secrets). Base defaults to "/".
          VITE_OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          VITE_REQUEST_ACCESS_URL: ${{ vars.REQUEST_ACCESS_URL }}
          # Build stamp: the deployed commit, shown in the footer and in diagnostic reports
          # (design-error-reporting.md). Truncated to a short SHA in the build.
          VITE_APP_COMMIT: ${{ github.sha }}
          # Public Turnstile site key — enables the feedback panel's Send action
          # (design-error-reporting.md). The matching secret lives only in the Pages project.
          VITE_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          # A MINIMAL token (Account → Cloudflare Pages → Edit only) — not the local
          # management token. Account id is public, kept as a repo variable.
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Run from apps/web so wrangler reads wrangler.toml (project name, output dir,
          # and the REPORT_KV binding) and bundles the Pages Functions in ./functions
          # (the feedback intake, /api/report). Runtime secrets live only in the Pages
          # project (design-error-reporting.md).
          workingDirectory: apps/web
          command: pages deploy --branch=main
