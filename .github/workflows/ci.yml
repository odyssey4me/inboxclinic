name: CI

# CI/CD pipeline. `build` (lint/typecheck/test/coverage/build) and `e2e` (Tier-3
# Playwright across chromium/firefox/webkit/mobile against demo mode) run on every push
# and PR. `deploy` runs only on main and **needs both**, so a broken build or a failing
# E2E run can never publish. Job names are stable so they back the required status checks.

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Zero-secrets check
        run: ./scripts/check-no-secrets.sh

      - name: No duplicate major versions
        run: ./scripts/check-no-dup-majors.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E (demo mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Installs the browser binaries + their system dependencies (needs the runner's
      # sudo). chromium also backs the mobile-viewport project.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # `npm run e2e` builds the app and serves the production bundle via vite preview
      # (playwright.config.ts webServer), then runs every project. CI is set by Actions,
      # so the config enables retries + the HTML report automatically.
      - name: Run E2E (demo mode)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Only publish from main, and only once both gates are green.
    needs: [build, e2e]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static PWA)
        env:
          # Public build inputs from repo variables (never secrets). Base defaults to "/".
          VITE_OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          VITE_REQUEST_ACCESS_URL: ${{ vars.REQUEST_ACCESS_URL }}
          # Build stamp: the deployed commit, shown in the footer and in diagnostic reports
          # (design-error-reporting.md). Truncated to a short SHA in the build.
          VITE_APP_COMMIT: ${{ github.sha }}
          # Public Turnstile site key — enables the feedback panel's Send action
          # (design-error-reporting.md). The matching secret lives only in the Pages project.
          VITE_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          # A MINIMAL token (Account → Cloudflare Pages → Edit only) — not the local
          # management token. Account id is public, kept as a repo variable.
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Run from apps/web so wrangler bundles the Pages Functions in ./functions
          # (the feedback intake, /api/report) alongside the static ./dist assets.
          # KV/secret bindings are configured in the Pages project (design-error-reporting.md).
          workingDirectory: apps/web
          command: pages deploy dist --project-name=inboxclinic --branch=main
