# Loop B — proactive review. On a schedule (and on demand), Claude reviews the repo and
# opens ISSUES proposing changes for the maintainer to triage. It never modifies code or
# opens PRs; approved proposals feed the label-triggered `claude-issue-implement.yml` loop.
#
# See the automation model in CONTRIBUTING.md and the invariant checklist it links.
# Auth: CLAUDE_CODE_OAUTH_TOKEN (subscription). Runs from the default branch (main).
name: Proactive review (Claude)

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: {}

# Least-privilege: read the code, file issues. No write to code, no PRs.
# id-token: write is required by claude-code-action for its OIDC token exchange.
permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Proactive review → propose issues
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Proactively review the Inbox Clinic repository and propose improvements as
            GitHub issues for the maintainer to triage. The goal is not just to find
            defects, but to help advance the project toward its stated intent.

            First build context — read and take these into account:
            - docs/architecture.md — the vision, principles, and invariants (the intent).
            - docs/ROADMAP.md — the build order and the current/next milestone.
            - docs/README.md and the design docs it indexes — the intended implementation.
            - CLAUDE.md and CONTRIBUTING.md — conventions and the invariant checklist.
            - Existing issues via `gh issue list --state all --limit 200`, AND their
              COMMENTS (not just titles) — including `feedback`-labelled app reports, prior
              `claude-proposed` issues (open AND closed), and any implementation-struggle
              reports a paused attempt left on `claude-approved` issues.

            Then review through these lenses and propose the most valuable improvements:
            1. Invariant/privacy audit — act as the `inbox-clinic-auditor` subagent
               (.claude/agents/inbox-clinic-auditor.md), applying the CONTRIBUTING checklist.
            2. Roadmap advancement — unstarted or partial work for the current/next
               milestone that would move it forward.
            3. Intent/vision alignment — where code or product drifts from architecture.md
               §1–2, or an opportunity to realise a principle better.
            4. Design-doc ↔ code drift — where an approved design doc and the code have
               diverged, or a doc has gone stale.
            5. Bugs, quality & test-coverage gaps — correctness risks and weak spots on
               critical paths, consistent with CLAUDE.md.
            6. Feedback synthesis — cluster open `feedback` issues, spot patterns, and
               propose concrete fixes or roadmap items.
            7. Unblock stalled work — for any issue labelled `needs-refinement` (a paused
               attempt's struggle report) or `hit-turn-limit` (an attempt that ran out of
               budget), act on it so the next attempt succeeds: sharpen the problem
               statement and add the specifics asked for, or split it into atomic issues if
               it's too large (a `hit-turn-limit` almost always means split it smaller).
               EDIT the existing issue (`gh issue edit`) — do not open a duplicate — then
               remove that label so the maintainer can re-approve it.

            Write each issue for a mixed audience — LEAD WITH IMPACT IN PLAIN LANGUAGE,
            then supply the technical detail:
            - Title: plain, impact-first language a non-engineer admin would understand —
              name the user-visible symptom or risk, not the code construct. (e.g.
              "Inbox analysis slows down as your mailbox grows", not "DexieRepo.query does
              a full-table scan".)
            - First section `## Impact` — who is affected and what they experience or risk,
              in user- or admin-facing language. No code identifiers here. Every finding
              has a consequence: data loss, a broken/blank screen, slowness that worsens
              with scale, a privacy leak, a wrong number shown, or (for internal-only
              issues) maintainer/operational risk — state it in those terms.
            - Then `## Details` — the technical specifics for whoever fixes it: root cause,
              evidence as file:line or doc section, and a concrete proposed change.

            Rules:
            - Deduplicate against ALL existing issues, and do NOT re-raise anything a prior
              `claude-proposed` issue was CLOSED without action (a closed proposal =
              declined).
            - Do NOT re-report findings already covered by CodeQL, Scorecard, Renovate,
              or the doc-sync hook — complement them, don't echo.
            - Granularity (two tiers):
              • SUBSTANTIVE findings — one issue each, where "one problem" = one coherent
                change a single focused PR would deliver. Tightly-coupled fixes in the
                SAME code unit may share one issue, but NEVER bundle unrelated concerns
                across different files (an un-splittable bundle can't be cleanly
                implemented or approved).
              • TRIVIAL nits (one-line / cosmetic — a stray flag, a redundant step, a
                wording tweak) — collect ALL of them into a SINGLE issue titled
                "Cleanup: …" and add the `cleanup` label. This batch is handled directly
                by the maintainer, NOT the implement loop; do not spread nits across many
                issues.
            - Prioritise: open at most ~8 issues, highest user/admin impact first.
            - Label every issue `claude-proposed`. Do NOT modify code, commit, or open pull
              requests — issues only. If nothing substantive is found, do nothing.
          # Read the repo + file issues via gh. contents:read means nothing can be pushed.
          claude_args: |
            --allowedTools Read,Grep,Glob,Bash
            --max-turns 45
