# Auto-merge Dependabot PRs once CI passes:
#   - npm: MINOR and PATCH only (library majors can pass build but break at runtime →
#     left for manual review);
#   - GitHub Actions: ALL updates including MAJORS — an action major runs inside the CI
#     that gates the merge, so green CI is direct proof it works. (A bad deploy-only
#     action just fails the next deploy; Cloudflare Pages keeps serving the last good one.)
# Auto-merge waits for the required status check (branch protection on main), then rebases.
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (npm minor/patch, or any GitHub Actions update)
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
