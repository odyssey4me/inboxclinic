# Loop A — issue → PR. When the maintainer labels an issue `claude-approved`, Claude
# implements the change on a branch and opens a PR that closes the issue. It NEVER pushes
# to main. On this PUBLIC repo only the maintainer has write access, so only they can
# apply the label — the trigger is inherently owner-gated.
#
# See the automation model in CONTRIBUTING.md. Auth: CLAUDE_CODE_OAUTH_TOKEN.
name: Implement approved issue (Claude)

on:
  issues:
    types: [labeled]

# Implementing needs write to code + PRs; issues:write to comment/close.
# id-token: write is required by claude-code-action for its OIDC token exchange.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    # Approved for implementation, but never a `cleanup` batch or a `maintainer-only`
    # issue (workflow/infra changes the GitHub App token can't push) — those are handled
    # directly by the maintainer, not the heavyweight per-issue loop.
    if: >-
      github.event.label.name == 'claude-approved' &&
      !contains(github.event.issue.labels.*.name, 'cleanup') &&
      !contains(github.event.issue.labels.*.name, 'maintainer-only')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so Claude can branch and diff

      - name: Implement issue → open PR
        id: implement
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The maintainer approved issue #${{ github.event.issue.number }} for
            implementation (they applied the `claude-approved` label). Read the issue AND
            its existing comments first — a previous attempt may have left a struggle
            report on what blocked it; use that to go straight to a working approach.

            IMPORTANT — you run in a SINGLE-SHOT CI job with NO continuation. You cannot
            pause, wait for background work, resume later, schedule a follow-up, or spawn a
            subagent and wait for it. Do NOT use the Agent/Task or ScheduleWakeup tools —
            they will silently strand your work uncommitted. Everything must happen inline
            in this one pass. Apply the "Reviewing for privacy & architecture invariants"
            checklist in CONTRIBUTING.md YOURSELF as you work — do not delegate it to the
            inbox-clinic-auditor or any subagent.

            Implement the requested change, following the repo conventions: CLAUDE.md,
            docs/architecture.md and the design docs, and the CONTRIBUTING invariant
            checklist.
            - Work on a NEW branch — never push to `main`. One focused problem per commit.
            - While iterating, run only the TARGETED checks for what you touched (the
              affected package's tests or a single test file, plus a typecheck) to keep the
              loop tight and cheap. Run the FULL suite (lint, typecheck, tests) ONCE at the
              end — before opening the PR — and fix any failures.
            - FINISH the job: `git add` + commit, PUSH the branch to origin, then open a
              PR with `gh pr create` (body includes "Closes #${{ github.event.issue.number }}").
              Editing files is NOT enough — uncommitted, unpushed work is discarded when
              the job ends. Confirm the PR actually exists before you stop.

            Budget & self-check: a focused fix should land in roughly 50 steps; the hard
            ceiling is 100. Treat these as a sense of scale, not a counter you can read —
            judge by PROGRESS, and do NOT burn toward the ceiling or force a low-quality PR. If you are NOT converging (thrashing, repeatedly failing the
            same check, the change is far larger/more coupled than the issue implies, the
            issue is underspecified, or it needs a maintainer decision), STOP and step
            back: ask *why* it's taking so long — is the issue not specific enough, did you
            go down a wrong path that needs a reset, or is the scope simply too big for one
            atomic change?

            Then post a COMMENT on the issue (`gh issue comment`) — do NOT open a PR — that
            gives the next attempt what it needs to succeed:
              • Why you paused: underspecified / too-large-should-split / blocked-by-X /
                wrong-approach-needs-reset / conflicts-with-an-invariant.
              • What you tried: the approach(es), dead-ends, files/areas touched, and any
                check that kept failing and the reason.
              • What would unblock it: the missing specifics, a concrete split into atomic
                issues, or the decision you need from the maintainer.
            After commenting, tag the issue for follow-up: `gh issue edit
            #${{ github.event.issue.number }} --add-label needs-refinement --remove-label
            claude-approved`. This makes the stall easy to spot and report on, and stops it
            being re-attempted until it's refined and re-approved.

            A clear struggle report is a SUCCESSFUL outcome when the task isn't yet
            tractable — it feeds the next round. Also stop-and-comment + tag (no PR) if the
            request is unclear, unsafe, or conflicts with an architectural invariant.
          claude_args: |
            --allowedTools Read,Grep,Glob,Edit,Write,Bash
            --max-turns 100

      - name: Save agent transcript
        if: always()
        env:
          EXEC: ${{ steps.implement.outputs.execution_file }}
        run: |
          # Persist the full agent transcript (every tool call + the result object) so a
          # no-op or failure can be diagnosed post-hoc — otherwise it is ephemeral and
          # `gh run view --log` doesn't expose the tool calls.
          if [[ -n "$EXEC" && -f "$EXEC" ]]; then
            cp "$EXEC" "$GITHUB_WORKSPACE/agent-transcript.json"
            echo "saved $(wc -c < "$GITHUB_WORKSPACE/agent-transcript.json") bytes"
          else
            echo '{"note":"no execution_file output was set for this run"}' > "$GITHUB_WORKSPACE/agent-transcript.json"
          fi

      - name: Upload agent transcript
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-transcript-${{ github.event.issue.number }}-${{ github.run_id }}
          path: agent-transcript.json
          retention-days: 30
          if-no-files-found: warn

      - name: Record run metrics
        if: always()
        env:
          EXEC: ${{ steps.implement.outputs.execution_file }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          # Per-run efficiency metrics from the agent's result object (num_turns, outcome,
          # duration, cost) — shown in the run summary and as a greppable log line for
          # aggregate reporting on how many rounds runs typically take.
          if [[ -n "$EXEC" && -f "$EXEC" ]]; then
            m=$(jq -r '[.[]|select(.type=="result")][0] | "\(.num_turns // "?")\t\(.subtype // "?")\t\(.is_error // false)\t\(.duration_ms // 0)\t\(.total_cost_usd // 0)"' "$EXEC")
            IFS=$'\t' read -r turns subtype err ms cost <<< "$m"
            {
              echo "### Implement metrics — issue #$ISSUE"
              echo "| turns | outcome | duration | cost (USD) |"
              echo "|------:|---------|---------:|-----------:|"
              echo "| $turns | \`$subtype\` | $(( ms / 1000 ))s | $cost |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "IMPLEMENT_METRICS issue=$ISSUE turns=$turns subtype=$subtype is_error=$err duration_ms=$ms cost_usd=$cost"
          else
            echo "IMPLEMENT_METRICS issue=$ISSUE turns=? subtype=no_execution_file"
          fi

      - name: Backstop — surface an ungraceful failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          EXEC: ${{ steps.implement.outputs.execution_file }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # A graceful pause exits success; reaching here means the attempt died hard
          # (turn limit or crash) with no PR and no struggle report — never let it be
          # silent. Distinct label per failure mode for reporting + actionable response.
          have=$(gh issue view "$ISSUE" --json labels --jq '[.labels[].name]|join(",")')
          case "$have" in *hit-turn-limit*|*needs-refinement*) echo "already tagged; skipping"; exit 0;; esac
          subtype=""; turns="?"
          if [[ -n "$EXEC" && -f "$EXEC" ]]; then
            subtype=$(jq -r '[.[]|select(.type=="result")][0].subtype // ""' "$EXEC")
            turns=$(jq -r '[.[]|select(.type=="result")][0].num_turns // "?"' "$EXEC")
          fi
          if [[ "$subtype" == "error_max_turns" ]]; then
            gh issue comment "$ISSUE" --body "⛔ **Hit the turn limit** after ${turns} turns — no PR and no struggle report. The change is likely bigger/more coupled than the issue implies, or the attempt wandered. Review the [run log]($RUN_URL), then split the issue / add specifics / raise the budget. Labelled \`hit-turn-limit\`."
            gh issue edit "$ISSUE" --add-label hit-turn-limit --remove-label claude-approved
          else
            gh issue comment "$ISSUE" --body "⚠️ The attempt failed (\`${subtype:-unknown}\`) with no PR and no struggle report — possibly a transient/infra error. See the [run log]($RUN_URL). Labelled \`needs-refinement\`; re-approve to retry, or inspect the run."
            gh issue edit "$ISSUE" --add-label needs-refinement --remove-label claude-approved
          fi

      - name: Guard — catch a silent no-op success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # A successful run must have EITHER opened a PR OR self-reported (a graceful
          # pause adds needs-refinement/hit-turn-limit + removes claude-approved). If it did
          # neither, it exited "success" having produced nothing — don't let that pass.
          labels=$(gh issue view "$ISSUE" --repo "$REPO" --json labels --jq '[.labels[].name]|join(",")')
          case "$labels" in *needs-refinement*|*hit-turn-limit*) echo "self-reported; ok"; exit 0;; esac
          prs=$(gh pr list --repo "$REPO" --state all --limit 50 --json closingIssuesReferences \
            --jq "[.[] | select([.closingIssuesReferences[].number] | index($ISSUE))] | length")
          if [[ "${prs:-0}" -gt 0 ]]; then echo "PR exists for #$ISSUE; ok"; exit 0; fi
          gh issue comment "$ISSUE" --body "⚠️ The implementation run finished (success) without opening a PR or leaving a struggle report — a silent no-op. See the [run log]($RUN_URL). Labelled \`needs-refinement\` so it isn't lost; refine and re-approve, or inspect the run."
          gh issue edit "$ISSUE" --add-label needs-refinement --remove-label claude-approved
